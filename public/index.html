<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Anketa</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  background:#0d1117;
  color:#e6edf3;
  font-family:'Poppins', sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}

.container {
  width:100%;
  max-width:500px;
  background:#161b22;
  padding:25px;
  border-radius:16px;
  box-shadow:0 0 25px rgba(0,0,0,0.5);
}

h1 {
  text-align:center;
  font-size:26px;
  margin-bottom:10px;
}

.sub {
  text-align:center;
  font-size:13px;
  color:#8b949e;
  margin-bottom:20px;
}

input, select {
  width:100%;
  padding:10px;
  margin-bottom:12px;
  border-radius:8px;
  border:none;
  background:#0d1117;
  color:white;
}

button {
  width:100%;
  padding:12px;
  background:#238636;
  border:none;
  border-radius:8px;
  color:white;
  font-size:16px;
  cursor:pointer;
}

button:hover {
  background:#2ea043;
}

.success {
  display:none;
  text-align:center;
  margin-top:15px;
  color:#3fb950;
}
</style>
</head>

<body>

<div class="container">

<h1>📝 Anketa to‘ldiring</h1>
<div class="sub">Iltimos oxirigacha to‘ldiring</div>

<form action="/submit" method="POST" enctype="multipart/form-data">

<input type="text" name="Ismingiz?" placeholder="Ismingiz" required>
<input type="text" name="Telefon raqamingiz?" placeholder="Telefon" required>
<input type="text" name="Telegram username?" placeholder="Telegram username">

<input type="text" name="Qaysi ishda ishlamoqchisiz?" placeholder="Qaysi ishda ishlamoqchisiz?" required>

<input type="text" name="Yashash manzilingiz?" placeholder="Yashash manzili" required>

<input type="number" name="Kutilayotgan oylik maosh?" placeholder="Kutilayotgan oylik maosh">

<select name="Oilaviy holatingiz?">
  <option value="">Oilaviy holat</option>
  <option value="Bo‘ydoq">Bo‘ydoq</option>
  <option value="Uylangan">Uylangan</option>
</select>

<select name="Sudlanganmisiz?">
  <option value="">Sudlanganmisiz?</option>
  <option value="Ha">Ha</option>
  <option value="Yo‘q">Yo‘q</option>
</select>

<input type="file" name="photo" accept="image/*">

<button type="submit">Yuborish</button>

</form>

<div class="success" id="successMsg">
  ✅ Ma'lumot yuborildi!
</div>

</div>

<script>
const form = document.querySelector("form");
const success = document.getElementById("successMsg");

form.addEventListener("submit", async (e) => {
  e.preventDefault();

  const formData = new FormData(form);

  const res = await fetch("/submit", {
    method: "POST",
    body: formData
  });

  if(res.ok){
    form.reset();
    success.style.display = "block";
  }
});
</script>

</body>
</html>
