<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Anketa</title>

<!-- Fontlar -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&family=Pacifico&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  background:#0d1117;
  color:#e6edf3;
  font-family:'Poppins', sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

/* Container */
.container {
  text-align:center;
  width:100%;
  max-width:420px;
}

/* Header */
.header h1 {
  font-family:'Pacifico', cursive;
  font-size:28px;
  margin-bottom:5px;
}

.header small {
  color:#8b949e;
  font-size:12px;
}

/* Sticker */
.sticker {
  font-size:40px;
  margin:10px 0;
}

/* Card */
.card {
  background:#161b22;
  padding:20px;
  border-radius:15px;
}

/* Question */
#question {
  text-align:center;
  font-weight:600;
  margin-bottom:15px;
}

/* Inputs */
input, select {
  width:100%;
  padding:10px;
  margin:10px 0;
  background:#0d1117;
  border:1px solid #30363d;
  color:white;
  border-radius:8px;
  text-align:center;
}

/* Buttons */
.buttons {
  display:flex;
  justify-content:space-between;
}

button {
  width:48%;
  padding:10px;
  background:#238636;
  border:none;
  color:white;
  border-radius:8px;
  cursor:pointer;
}

button:hover {
  background:#2ea043;
}
</style>
</head>

<body>

<div class="container">

  <!-- HEADER -->
  <div class="header">
    <h1>Anketa to‘ldiring</h1>
    <div class="sticker">📋✨</div>
    <small>Iltimos oxirigacha to‘ldiring</small>
  </div>

  <!-- CARD -->
  <div class="card">

    <div id="question"></div>

    <input type="text" id="input">
    <select id="select" style="display:none;"></select>
    <input type="file" id="photo" style="display:none;">

    <div class="buttons">
      <button onclick="prev()">Ortga</button>
      <button onclick="next()">Keyingi</button>
    </div>

  </div>

</div>

<script>
const questions = [
  {q:"Ismingiz?"},
  {q:"Telefon raqamingiz?"},
  {q:"Telegram username?"},
  {q:"Qaysi ishda ishlamoqchisiz?"},
  {q:"Yashash manzilingiz?"},
  {q:"Kutilayotgan oylik maosh?"},
  {q:"Oilaviy holatingiz?", type:"select", options:["Bo‘ydoq","Uylangan/Turmush qurgan"]},
  {q:"Sudlanganmisiz?", type:"select", options:["Ha","Yo‘q"]},
  {q:"Rasmingizni yuklang", type:"file"}
];

let i = 0;
let answers = {};

function show(){
  let q = questions[i];
  document.getElementById("question").innerText = q.q;

  document.getElementById("input").style.display="none";
  document.getElementById("select").style.display="none";
  document.getElementById("photo").style.display="none";

  if(!q.type){
    let input = document.getElementById("input");
    input.style.display="block";
    input.value = answers[q.q] || "";
  }

  if(q.type==="select"){
    let select = document.getElementById("select");
    select.style.display="block";
    select.innerHTML="";

    q.options.forEach(o=>{
      let opt=document.createElement("option");
      opt.value=o;
      opt.innerText=o;
      select.appendChild(opt);
    });

    select.value = answers[q.q] || "";
  }

  if(q.type==="file"){
    document.getElementById("photo").style.display="block";
  }
}

function next(){
  save();

  if(i < questions.length-1){
    i++;
    show();
  } else {
    sendData();
  }
}

function prev(){
  if(i>0){
    i--;
    show();
  }
}

function save(){
  let q = questions[i];

  if(q.type==="file"){
    answers.photo = document.getElementById("photo").files[0];
  } 
  else if(q.type==="select"){
    answers[q.q] = document.getElementById("select").value;
  }
  else {
    answers[q.q] = document.getElementById("input").value;
  }
}

function sendData(){
  const formData = new FormData();

  for(let key in answers){
    formData.append(key, answers[key]);
  }

  fetch("/submit", {
    method:"POST",
    body:formData
  })
  .then(()=>alert("Yuborildi ✅"));
}

show();
</script>

</body>
</html>
