<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#111;
  padding:20px;
  color:white;
}

h2{
  text-align:center;
}

.container{
  display:flex;
  flex-wrap:wrap;
  gap:15px;
  justify-content:center;
}

.card{
  background:#fff;
  color:#000;
  padding:15px;
  border-radius:10px;
  width:300px;
}

.item{
  margin:5px 0;
  font-size:14px;
}

.date{
  font-size:12px;
  color:gray;
  margin-bottom:10px;
}
</style>
</head>

<body>

<h2>📊 Admin Panel</h2>

<div class="container" id="container">
  <p>Yuklanmoqda...</p>
</div>

<script>

const container = document.getElementById("container");

// DATA YUKLASH
fetch("/api/data")
  .then(res => {
    if(!res.ok){
      throw new Error("Server javob bermadi");
    }
    return res.json();
  })
  .then(data => {

    container.innerHTML = "";

    if(data.length === 0){
      container.innerHTML = "<p>Hozircha ma'lumot yo‘q</p>";
      return;
    }

    data.forEach(user => {

      const card = document.createElement("div");
      card.className = "card";

      let html = `<div class="date">🕒 ${user.createdAt || ""}</div>`;

      for(let key in user){
        if(key !== "id" && key !== "createdAt"){
          html += `<div class="item"><b>${key}:</b> ${user[key]}</div>`;
        }
      }

      card.innerHTML = html;
      container.appendChild(card);

    });

  })
  .catch(err => {
    console.error(err);
    container.innerHTML = "<p style='color:red'>❌ Server bilan bog‘lanmadi</p>";
  });

</script>

</body>
</html>
