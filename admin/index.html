<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Panel</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  background:#0d1117;
  color:#e6edf3;
  font-family:'Poppins', sans-serif;
}

/* HEADER */
.header {
  text-align:center;
  padding:20px;
  font-size:22px;
  font-weight:700;
  border-bottom:1px solid #30363d;
}

/* GRID */
.container {
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
  gap:20px;
  padding:20px;
}

/* CARD */
.card {
  background:#161b22;
  border-radius:16px;
  overflow:hidden;
  transition:0.3s;
  box-shadow:0 0 20px rgba(0,0,0,0.4);
}

.card:hover {
  transform:translateY(-5px);
}

/* IMAGE */
.card img {
  width:100%;
  height:220px;
  object-fit:cover;
}

/* CONTENT */
.content {
  padding:15px;
}

/* TIME */
.time {
  font-size:12px;
  color:#8b949e;
  margin-bottom:10px;
}

/* ROW */
.row {
  margin-bottom:6px;
  font-size:14px;
}

/* LABEL */
.label {
  color:#58a6ff;
  font-weight:600;
}

/* BADGES */
.badge {
  padding:3px 8px;
  border-radius:6px;
  font-size:12px;
  margin-left:5px;
}

.yes {
  background:#238636;
}

.no {
  background:#da3633;
}

/* EMPTY */
.empty {
  text-align:center;
  margin-top:50px;
  color:#8b949e;
}

/* MOBILE */
@media(max-width:500px){
  .header {
    font-size:18px;
  }
}
</style>
</head>

<body>

<div class="header">📋 Arizalar ro‘yxati</div>

<div class="container" id="list"></div>

<div class="empty" id="empty" style="display:none;">
  Hozircha arizalar yo‘q
</div>

<script>
fetch('/data')
.then(res => res.json())
.then(data => {

  const list = document.getElementById("list");
  const empty = document.getElementById("empty");

  if(data.length === 0){
    empty.style.display = "block";
    return;
  }

  data.reverse().forEach(u => {

    const sudlanganBadge = u["Sudlanganmisiz?"] === "Ha"
      ? '<span class="badge yes">Ha</span>'
      : '<span class="badge no">Yo‘q</span>';

    list.innerHTML += `
      <div class="card">

        ${u.photo ? `<img src="/uploads/${u.photo}">` : ""}

        <div class="content">

          <div class="time">🕒 ${u.date || "Noma'lum vaqt"}</div>

          <div class="row"><span class="label">Ism:</span> ${u["Ismingiz?"] || "-"}</div>
          <div class="row"><span class="label">Telefon:</span> ${u["Telefon raqamingiz?"] || "-"}</div>
          <div class="row"><span class="label">Telegram:</span> ${u["Telegram username?"] || "-"}</div>
          <div class="row"><span class="label">Ish:</span> ${u["Qaysi ishda ishlamoqchisiz?"] || "-"}</div>
          <div class="row"><span class="label">Manzil:</span> ${u["Yashash manzilingiz?"] || "-"}</div>
          <div class="row"><span class="label">Oylik:</span> ${u["Kutilayotgan oylik maosh?"] || "-"}</div>
          <div class="row"><span class="label">Oilaviy:</span> ${u["Oilaviy holatingiz?"] || "-"}</div>

          <div class="row">
            <span class="label">Sudlangan:</span>
            ${sudlanganBadge}
          </div>

        </div>

      </div>
    `;
  });

})
.catch(() => {
  document.getElementById("empty").style.display = "block";
});
</script>

</body>
</html>
